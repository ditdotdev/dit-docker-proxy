name: Repo Health

on:
  push:
    branches: [master]
  pull_request:
    branches: [master, main]

jobs:
  health:
    uses: ditdotdev/.github/.github/workflows/repo-health.yml@master
    with:
      language: go
      # Forwarder is at 100%; listener is at 93.3% (the net.Listen wire
      # path isn't directly exercised — see follow-up issue). 90 leaves
      # headroom for that without forcing every PR through manual
      # listener-test work.
      coverage-floor: 90
      max-cyclomatic: 25
      mode: block
    secrets:
      GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
