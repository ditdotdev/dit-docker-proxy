#
# Build and test on pull request
#
name: Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
      - name: Build
        run: go build -v ./cmd/docker-volume-proxy
      - name: Test
        run: go test -v ./...
