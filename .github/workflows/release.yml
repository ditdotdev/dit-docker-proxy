#
# Copyright Dit.
#

#
# When a tag is pushed, build the binary, attach it to the release, and
# publish (remove draft status). Mirrors the convention used in
# dit-client-go's release workflow — see that repo for the
# reference implementation.
#
name: Release

on: create

permissions:
  contents: write
  pull-requests: write

jobs:
  health:
    uses: ditdotdev/.github/.github/workflows/repo-health.yml@master
    with:
      language: go
      coverage-floor: 90
      mode: block
    secrets:
      GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}

  upload:
    needs: health
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}

      - name: Get or Create Draft Release
        id: draft_release
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Looking for draft release with tag: $TAG_NAME"

          # Try to find existing draft release for this tag (release-drafter
          # populates one on every PR merge, and can leave more than one
          # draft for the same tag). head -1 keeps RELEASE_ID a single line
          # so the GITHUB_OUTPUT write stays valid key=value format.
          RELEASE_ID=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" | \
            jq -rc --arg tag "$TAG_NAME" '.[] | select(.draft and .tag_name == $tag) | .id' | head -1)

          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            echo "Found existing draft release: $RELEASE_ID"
            echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          else
            echo "No draft release found for tag $TAG_NAME, creating one..."
            RESPONSE=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
              -X POST "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" \
              -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"$TAG_NAME\",\"body\":\"Release $TAG_NAME\",\"draft\":true}")

            RELEASE_ID=$(echo "$RESPONSE" | jq -rc '.id')
            echo "Created draft release with ID: $RELEASE_ID"
            echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o docker-volume-proxy ./cmd/docker-volume-proxy
          ls -la docker-volume-proxy
        env:
          GOPRIVATE: github.com/ditdotdev/*

      - name: Test
        run: go test ./...
        env:
          GOPRIVATE: github.com/ditdotdev/*

      # Upload to the exact release_id captured above instead of letting
      # `gh release upload <tag>` re-resolve the tag. Tag resolution can pick
      # a different release than the one we publish if duplicate drafts ever
      # exist for the same tag, which would publish an empty release while the
      # binary lands on the other one. Targeting the id keeps upload and
      # publish on the same release. The pre-delete makes reruns idempotent —
      # the assets API rejects a second upload of the same name with 422.
      - name: Upload Artifact to GitHub Release
        run: |
          RELEASE_ID="${{ steps.draft_release.outputs.release_id }}"
          EXISTING=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets" | \
            jq -rc '.[] | select(.name == "docker-volume-proxy") | .id')
          for id in $EXISTING; do
            echo "Removing prior asset $id"
            curl -sH "Authorization: token $GITHUB_TOKEN" \
              -X DELETE "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/assets/$id"
          done
          echo "Uploading docker-volume-proxy to release $RELEASE_ID"
          curl -sH "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @docker-volume-proxy \
            "https://uploads.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=docker-volume-proxy"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mirror the publish step from dit-client-go's release.yml.
      # Without this the release stays in draft state and someone has to
      # manually `gh release edit --draft=false` after every tag.
      - name: Publish Release
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          RELEASE_ID="${{ steps.draft_release.outputs.release_id }}"
          echo "Publishing release $RELEASE_ID for tag $TAG_NAME"
          curl -sH "Authorization: token $GITHUB_TOKEN" \
            -X PATCH "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -d "{\"draft\":false}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
