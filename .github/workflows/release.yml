#
# When a tag is pushed, build and upload the binary to GitHub releases and S3 Maven bucket.
#
name: Release

on: create

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}
      - name: Get Draft Release
        id: draft_release
        run: |
          echo -n ::set-output name=upload_url::
          curl -sH "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/$GITHUB_REPOSITORY/releases | jq -rc '.[] | select(.draft) | .upload_url'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Build
        run: go build ./cmd/docker-volume-proxy
        env:
          GOPRIVATE: github.com/datadatdat/*
      - name: Test
        run: go test ./...
        env:
          GOPRIVATE: github.com/datadatdat/*
      - name: Upload Artifact to GitHub Release
        uses: actions/upload-release-asset@v1.0.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.draft_release.outputs.upload_url }}
          asset_path: ./docker-volume-proxy
          asset_name: docker-volume-proxy
          asset_content_type: application/octet-stream
      - name: Upload Binary to S3 Maven Bucket
        run: |
          aws s3 cp ./docker-volume-proxy s3://${{ secrets.MAVEN_BUCKET }}/datadatdat-docker-proxy/docker-volume-proxy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
