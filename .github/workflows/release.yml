#
# Copyright Datadatdat.
#

#
# When a tag is pushed, build the binary, attach it to the release, and
# publish (remove draft status). Mirrors the convention used in
# datadatdat-client-go's release workflow — see that repo for the
# reference implementation.
#
name: Release

on: create

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - name: Configure Git for private modules
        run: git config --global url."https://${{ secrets.GO_MODULES_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GO_MODULES_TOKEN: ${{ secrets.GO_MODULES_TOKEN }}

      - name: Get or Create Draft Release
        id: draft_release
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "Looking for draft release with tag: $TAG_NAME"

          # Try to find existing draft release for this tag (release-drafter
          # populates one on every PR merge).
          RELEASE_ID=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" | \
            jq -rc --arg tag "$TAG_NAME" '.[] | select(.draft and .tag_name == $tag) | .id')

          if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
            echo "Found existing draft release: $RELEASE_ID"
            echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          else
            echo "No draft release found for tag $TAG_NAME, creating one..."
            RESPONSE=$(curl -sH "Authorization: token $GITHUB_TOKEN" \
              -X POST "https://api.github.com/repos/$GITHUB_REPOSITORY/releases" \
              -d "{\"tag_name\":\"$TAG_NAME\",\"name\":\"$TAG_NAME\",\"body\":\"Release $TAG_NAME\",\"draft\":true}")

            RELEASE_ID=$(echo "$RESPONSE" | jq -rc '.id')
            echo "Created draft release with ID: $RELEASE_ID"
            echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o docker-volume-proxy ./cmd/docker-volume-proxy
          ls -la docker-volume-proxy
        env:
          GOPRIVATE: github.com/datadatdat/*

      - name: Test
        run: go test ./...
        env:
          GOPRIVATE: github.com/datadatdat/*

      # Use `gh release upload` instead of the deprecated
      # actions/upload-release-asset@v1 (EOL since 2021). --clobber
      # replaces any partial upload from a prior failed attempt on the
      # same tag, so reruns are safe.
      - name: Upload Artifact to GitHub Release
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          gh release upload "$TAG_NAME" ./docker-volume-proxy --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Mirror the publish step from datadatdat-client-go's release.yml.
      # Without this the release stays in draft state and someone has to
      # manually `gh release edit --draft=false` after every tag.
      - name: Publish Release
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          RELEASE_ID="${{ steps.draft_release.outputs.release_id }}"
          echo "Publishing release $RELEASE_ID for tag $TAG_NAME"
          curl -sH "Authorization: token $GITHUB_TOKEN" \
            -X PATCH "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -d "{\"draft\":false}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
